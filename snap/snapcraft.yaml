name: home-assistant
title: Home Assistant
version: '0.1.0'
summary: Home Assistant (Container) managed via the Docker snap
description: |
  Runs the official Home Assistant container image
  (ghcr.io/home-assistant/home-assistant) using the Docker snap.

  Requires the docker snap (installed automatically on first install). After
  installing, connect the interfaces:

    snap connect home-assistant:docker docker:docker-daemon
    snap connect home-assistant:docker-executables docker:docker-executables

  Configure, e.g.:

    snap set home-assistant docker.timezone=Europe/Oslo
    snap set home-assistant docker.devices.zigbee=/dev/serial/by-id/...
    snap set home-assistant docker.config-dir=/home/<user>/home-assistant   # opt-in bind mount

  Install HACS (the Home Assistant Community Store):

    home-assistant.install hacs

  Surface a companion service's UI in the sidebar (ingress):

    home-assistant.install hass-ingress
    snap set home-assistant ingress.zwave.url=http://localhost:8091 ingress.zwave.title="Z-Wave JS UI"
    home-assistant.ingress sync

license: Apache-2.0
contact: https://github.com/giaever-online-iot/home-assistant/issues
issues: https://github.com/giaever-online-iot/home-assistant/issues
source-code: https://github.com/giaever-online-iot/home-assistant
website: https://www.home-assistant.io

base: core26
confinement: strict
grade: stable

platforms:
  amd64:
  arm64:

plugs:
  docker:
    interface: docker
  docker-executables:
    interface: content
    content: docker-executables
    target: $SNAP/docker-snap
    default-provider: docker

apps:
  daemon:
    command: bin/launcher daemon
    daemon: simple
    restart-condition: always
    plugs: [docker]
  reconcile:
    command: bin/launcher reconcile
    plugs: [docker]
  update:
    command: bin/launcher update
    plugs: [docker]
  backup:
    command: bin/launcher backup
    plugs: [docker]
  rollback:
    command: bin/launcher rollback
    plugs: [docker]
  check-config:
    command: bin/launcher check-config
    plugs: [docker]
  cli:
    command: bin/launcher cli
    plugs: [docker]
  install:
    command: bin/launcher install
    plugs: [docker]
  ingress:
    command: bin/launcher ingress
    plugs: [docker]

parts:
  launcher:
    plugin: go
    source: .
    build-snaps:
      - go
