name: Release on merge

on:
  pull_request:
    types: [closed]
    branches: [main]
    # Mirror pr-build-snap's filter: a merge only has something to promote when the
    # PR built something (snap/, cmd/, internal/, or go.mod). Docs-only merges skip
    # entirely; the branch-has-revisions guard remains the backstop.
    paths:
      - 'snap/**'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'

permissions:
  contents: read

# Serialize ALL merge releases so two near-simultaneous merges can't race on the
# shared latest/* channels. Never cancel an in-flight promotion.
concurrency:
  group: snap-release
  cancel-in-progress: false

env:
  SNAP_NAME: home-assistant

jobs:
  promote:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Resolve version
        id: meta
        run: |
          set -euo pipefail
          V="$(yq '.version' snap/snapcraft.yaml)"
          # ── TRACK-SPECIFIC (disabled): per-version v<MM> track resolution ──
          # TRACK="$(.github/scripts/snap-release.sh version-to-track "$V")"
          # echo "track=$TRACK" >> "$GITHUB_OUTPUT"
          # ───────────────────────────────────────────────────────────────────
          {
            echo "version=$V"
            echo "pr=${{ github.event.pull_request.number }}"
          } >> "$GITHUB_OUTPUT"

      - name: Promote PR revisions to latest/* channels
        run: |
          set -euo pipefail
          SR=.github/scripts/snap-release.sh
          SNAP="$SNAP_NAME"
          V="${{ steps.meta.outputs.version }}"
          PR="${{ steps.meta.outputs.pr }}"
          # "pr<N>" branch (>= 2 chars; store rejects a bare single-digit) — keep in sync with pr-build-snap.yml.
          BRANCH="latest/edge/pr$PR"

          INFO="$(snapcraft status "$SNAP")"

          if [ "$("$SR" branch-has-revisions latest "pr$PR" <<<"$INFO")" != "yes" ]; then
            echo "::warning::release-on-merge: no revisions in $BRANCH to promote. If the build uploaded (see this PR's 'PR Build Snap' run), release them manually:"
            echo "  snapcraft promote $SNAP --from-channel $BRANCH --to-channel latest/candidate --yes   # if this is the newest release"
            echo "  snapcraft promote $SNAP --from-channel $BRANCH --to-channel latest/edge --yes"
            echo "  # or by revision: snapcraft revisions $SNAP  ->  snapcraft release $SNAP <rev> latest/candidate,latest/edge"
            exit 0
          fi

          CAND="$("$SR" channel-version latest/candidate <<<"$INFO")"
          echo "Merged $V; current latest/candidate=${CAND:-<none>}"

          # 1) Major bump: move previous major's final to latest/stable BEFORE candidate is overwritten.
          if [ "$("$SR" needs-stable-bump "$V" "$CAND")" = "yes" ]; then
            echo ">> major bump: latest/candidate -> latest/stable"
            snapcraft promote "$SNAP" --from-channel latest/candidate --to-channel latest/stable --yes
          fi

          # ── TRACK-SPECIFIC (disabled until per-version tracks are set up) ──
          # 2) The version track's own stable line (always; safe for backports).
          # TRACK="${{ steps.meta.outputs.track }}"
          # echo ">> $TRACK/edge/$PR -> $TRACK/stable"
          # snapcraft promote "$SNAP" --from-channel "$TRACK/edge/$PR" --to-channel "$TRACK/stable" --yes
          # ───────────────────────────────────────────────────────────────────

          # 3) Shared latest/* only if this isn't a backport.
          if [ "$("$SR" is-at-least "$V" "$CAND")" = "yes" ]; then
            echo ">> $BRANCH -> latest/candidate, latest/edge"
            snapcraft promote "$SNAP" --from-channel "$BRANCH" --to-channel latest/candidate --yes
            snapcraft promote "$SNAP" --from-channel "$BRANCH" --to-channel latest/edge --yes
          else
            echo ">> backport ($V < $CAND): leaving latest/* unchanged"
          fi

          # 4) Close the PR branch (auto-expires anyway; this is tidy-up).
          echo ">> closing $BRANCH"
          snapcraft close "$SNAP" "$BRANCH" --yes || echo "close failed (already gone?); ignoring"

          # ── TRACK-SPECIFIC (disabled): default track follows the merged line ──
          # CAND_TRACK=""
          # if [ -n "$CAND" ]; then CAND_TRACK="$("$SR" version-to-track "$CAND")"; fi
          # TRACK="${{ steps.meta.outputs.track }}"
          # if [ "$TRACK" != "$CAND_TRACK" ] && [ "$("$SR" is-at-least "$TRACK" "$CAND_TRACK")" = "yes" ]; then
          #   echo ">> set default track -> $TRACK"
          #   snapcraft set-default-track "$SNAP" "$TRACK"
          # else
          #   echo ">> default track unchanged (line=${CAND_TRACK:-<none>})"
          # fi
          # ──────────────────────────────────────────────────────────────────────
